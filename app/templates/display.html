<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주문 현황</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{background:#0b1020;color:#f8fafc;overflow:hidden;
    font-family:"Pretendard","Malgun Gothic",sans-serif;
    display:flex;flex-direction:column;}
  header{display:flex;justify-content:space-between;align-items:baseline;
    padding:24px 40px 12px;}
  header h1{font-size:34px;font-weight:800;letter-spacing:-1px;}
  header .clock{font-size:24px;color:#94a3b8;font-variant-numeric:tabular-nums;}
  main{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:24px;
    padding:8px 40px 36px;min-height:0;}
  .col{background:rgba(255,255,255,.04);border-radius:24px;padding:24px 28px;
    display:flex;flex-direction:column;min-height:0;}
  .col h2{font-size:26px;font-weight:700;margin-bottom:18px;
    display:flex;align-items:center;gap:10px;}
  .col.ready h2{color:#fbbf24;}
  .col.done h2{color:#34d399;}
  .dot{width:14px;height:14px;border-radius:50%;}
  .ready .dot{background:#fbbf24;}
  .done .dot{background:#34d399;animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  .nums{display:flex;flex-wrap:wrap;gap:16px;align-content:flex-start;
    overflow-y:auto;flex:1;}
  .num{min-width:118px;text-align:center;border-radius:18px;padding:18px 10px;
    font-size:58px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;}
  .ready .num{background:rgba(251,191,36,.12);color:#fde68a;
    border:2px solid rgba(251,191,36,.35);}
  .done .num{background:rgba(52,211,153,.16);color:#6ee7b7;
    border:2px solid rgba(52,211,153,.5);}
  .done .num.fresh{animation:pop .6s ease;}
  @keyframes pop{0%{transform:scale(.6);opacity:0;}60%{transform:scale(1.12);}100%{transform:scale(1);opacity:1;}}
  .empty{color:#475569;font-size:22px;padding:20px 4px;}
  footer{text-align:center;color:#475569;font-size:15px;padding-bottom:14px;}
  /* 스크롤바 숨김 (키오스크) */
  .nums::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
  <header>
    <h1>☕ 주문 현황</h1>
    <div class="clock" id="clock">--:--:--</div>
  </header>
  <main>
    <section class="col ready">
      <h2><span class="dot"></span>준비중</h2>
      <div class="nums" id="ready"><div class="empty">접수된 주문이 없습니다</div></div>
    </section>
    <section class="col done">
      <h2><span class="dot"></span>나왔습니다 · 찾아가세요</h2>
      <div class="nums" id="done"><div class="empty">완료된 주문이 없습니다</div></div>
    </section>
  </main>
  <footer>주문번호가 오른쪽 초록색으로 넘어오면 카운터에서 받아가세요</footer>

<script>
let shownDone = new Set();   // 이미 표시된 완료 번호 (새로 넘어온 것만 애니메이션)

function tickClock(){
  const t = new Date();
  const p = n => String(n).padStart(2,"0");
  document.getElementById("clock").textContent =
    `${p(t.getHours())}:${p(t.getMinutes())}:${p(t.getSeconds())}`;
}
setInterval(tickClock, 1000); tickClock();

function render(el, list, isDone){
  if(!list.length){
    el.innerHTML = `<div class="empty">${isDone?"완료된":"접수된"} 주문이 없습니다</div>`;
    return;
  }
  el.innerHTML = list.map(o=>{
    const fresh = isDone && !shownDone.has(o.order_no);
    return `<div class="num${fresh?" fresh":""}">${o.order_no}</div>`;
  }).join("");
}

async function load(){
  try{
    const board = await (await fetch("/api/orders")).json();
    // 번호 오름차순으로 보여주면 손님이 찾기 쉬움
    const waiting = board.filter(o=>o.status==="waiting").sort((a,b)=>a.order_no-b.order_no);
    const done    = board.filter(o=>o.status==="done").sort((a,b)=>a.order_no-b.order_no);

    render(document.getElementById("ready"), waiting, false);
    render(document.getElementById("done"), done, true);

    // 새 완료 번호 기록 (다음 폴링 때 애니메이션 중복 방지)
    shownDone = new Set(done.map(o=>o.order_no));
  }catch(e){
    // 서버가 잠깐 끊겨도 화면 유지
  }
}
load();
setInterval(load, 4000);  // 4초마다 갱신
</script>
</body>
</html>

<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>카페 주문</title>
<link rel="stylesheet" href="/static/order.css">
<script>
window.ORDER_CATEGORIES = {{ categories | tojson }};
window.ORDER_MENU = {{ menu | tojson }};
</script>
<script src="/static/order.js" defer></script>
</head>
<body>
<main class="page">
  <section class="hero">
    <div>
      <p class="eyebrow">Cafe Order</p>
      <h1>자리 주문</h1>
      <p class="lead">메뉴 담기 · 자리/옵션 선택 · 주문 전송</p>
      <div class="actions">
        <a class="button primary" href="#menu-board">주문하기</a>
        <button class="button ghost" id="copy-url" type="button">주소 복사</button>
      </div>
    </div>
    <aside class="status">
      <span>상태</span>
      <strong>Online</strong>
      <p>주문 가능</p>
      <button class="mini" type="button" onclick="location.reload()">새로고침</button>
    </aside>
  </section>

  <section class="layout" id="menu-board">
    <div class="menu-area">
      <section class="order-box">
        <div class="order-title">
          <p class="eyebrow">Order</p>
          <h2>자리·옵션</h2>
        </div>
        <div class="group">
          <div class="head"><strong>자리</strong><span id="seat-label">선택 안 함</span></div>
          <div class="seat-grid" id="seat-grid"></div>
        </div>
        <div class="group">
          <div class="head"><strong>옵션</strong><span id="option-label">기본</span></div>
          <div class="option-grid" id="option-grid"></div>
        </div>
      </section>

      <nav class="tabs" id="category-tabs"></nav>
      <section class="menu-section active">
        <div class="section-title">
          <div><p class="eyebrow" id="category-hint"></p><h2 id="category-title"></h2></div>
          <span id="category-count"></span>
        </div>
        <div class="menu-list" id="menu-list"></div>
      </section>
    </div>

    <aside class="cart">
      <div class="cart-head">
        <div><p class="eyebrow">Cart</p><h2>장바구니</h2></div>
        <button class="clear" id="clear-cart" type="button">비우기</button>
      </div>
      <div class="cart-list" id="cart-list"><p class="empty">메뉴를 담아 주세요.</p></div>
      <div class="summary">
        <span id="cart-seat">자리: 선택 안 함</span>
        <span id="cart-options">옵션: 기본</span>
      </div>
      <div class="cart-total"><span>합계</span><strong id="cart-total">0원</strong></div>
      <button class="submit" id="submit-order" type="button" disabled>주문 보내기</button>
      <p class="help">번호판·주방·분석에 함께 저장됩니다.</p>
    </aside>
  </section>
</main>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
</body>
</html>
